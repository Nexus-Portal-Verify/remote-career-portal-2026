<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired - Secure Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            border-top: 5px solid #EA4335; /* Google Red */
        }
        .icon {
            font-size: 4rem;
            color: #EA4335;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background: #4285F4; /* Google Blue */
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }
        .timer {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
    <h1>Session Disconnected</h1>
    <p>We are sorry, but your secure application session has timed out or the requested page is unavailable for your region.</p>
    
    <a href="index.html" class="btn">
        <i class="fas fa-redo"></i> Restart Assessment
    </a>

    <div class="timer" id="redirect-msg">
        Auto-redirecting in <span id="seconds">10</span> seconds...
    </div>
</div>

<script>
    // Automatically redirect back to the home page after 10 seconds
    let timeLeft = 10;
    let downloadTimer = setInterval(function(){
        if(timeLeft <= 0){
            clearInterval(downloadTimer);
            window.location.href = "index.html";
        } else {
            document.getElementById("seconds").innerHTML = timeLeft;
        }
        timeLeft -= 1;
    }, 1000);
</script>

</body>
</html>
